<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결제 등록 1 · 유형</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF; --page-bg:#c9cdd4; --bg:#FFFFFF; --line:#ECEEF1; --border:#B1B8BE; --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;}
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',sans-serif; color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:#fff; position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:50px; display:flex; align-items:center; padding:0 10px; flex:0 0 auto;}
  .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{flex:1; text-align:center; font-size:16px; font-weight:700; margin-right:40px;}
  .prog{height:4px; background:var(--line); margin:0 24px 6px; border-radius:2px; overflow:hidden;}
  .prog i{display:block; height:100%; width:25%; background:var(--primary); border-radius:2px;}
  .body{flex:1; overflow-y:auto; padding:14px 24px 24px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}
  .q{font-size:22px; font-weight:700; letter-spacing:-.3px; margin-bottom:16px;}
  .catrow{display:flex; align-items:center; gap:14px; padding:14px 2px; border-bottom:1px solid var(--line); cursor:pointer;}
  .catrow:last-child{border-bottom:none;}
  .catrow .cic{width:40px; height:40px; border-radius:12px; background:var(--tile); display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .catrow .cic iconify-icon{font-size:22px; color:var(--primary);}
  .catrow .ct{flex:1; min-width:0;}
  .catrow .ct .cn{font-size:16px; font-weight:600; color:var(--ink);}
  .catrow .ct .cd{font-size:12px; color:var(--placeholder); margin-top:2px;}
  .catrow .gv{color:var(--icon-off); font-size:20px;}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span class="time">9:41</span><span class="stat">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
  </span></div>
  <div class="topbar"><div class="back" onclick="history.back()">‹</div><div class="ttl">결제 등록</div></div>
  <div class="prog"><i></i></div>

  <div class="body">
    <div class="q">무엇을 결제할까요?</div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:home-4-fill"></iconify-icon></div><div class="ct"><div class="cn">부동산 임대차</div><div class="cd">월세 · 관리비 · 계약금 · 보증금</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:building-2-fill"></iconify-icon></div><div class="ct"><div class="cn">별도 관리비</div><div class="cd">아파트 · 상가 관리비만 따로 낼 때</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:paint-brush-fill"></iconify-icon></div><div class="ct"><div class="cn">인테리어</div><div class="cd">공사 · 수리 · 시공 · 설치 · 철거비</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:cash-fill"></iconify-icon></div><div class="ct"><div class="cn">복비</div><div class="cd">부동산 중개수수료</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:truck-fill"></iconify-icon></div><div class="ct"><div class="cn">이사비</div><div class="cd">용달 · 포장이사</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:broom-fill"></iconify-icon></div><div class="ct"><div class="cn">청소비</div><div class="cd">입주 · 정기 청소</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:package-2-fill"></iconify-icon></div><div class="ct"><div class="cn">B2B 매입대금</div><div class="cd">거래처 · 식자재 대금</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:car-fill"></iconify-icon></div><div class="ct"><div class="cn">렌트료 · 렌탈료</div><div class="cd">자동차 · 가전 · 생활용품</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:shield-fill"></iconify-icon></div><div class="ct"><div class="cn">보험료</div><div class="cd">건강 · 연금 · 화재</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:group-3-fill"></iconify-icon></div><div class="ct"><div class="cn">인건비 · 용역비</div><div class="cd">급여 · 알바 · 프리랜서 · 외주</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:mortarboard-fill"></iconify-icon></div><div class="ct"><div class="cn">교육비</div><div class="cd">학원 · 수강료 · 등록금 · 과외</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
    <div class="catrow" onclick="go()"><div class="cic"><iconify-icon icon="mingcute:more-3-fill"></iconify-icon></div><div class="ct"><div class="cn">기타</div><div class="cd">위 유형이 아닌 납부건</div></div><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>
  </div>
</div>
<script>function go(){ location.href='10_2_금액.html'; }</script>
<script src="app.js"></script>
</body>
</html>
