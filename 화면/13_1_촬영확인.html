<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>촬영 확인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF; --page-bg:#c9cdd4; --bg:#F4F5F6; --line:#ECEEF1; --border:#B1B8BE; --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1; --success:#059669; --success-bg:#EAF7F0;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary)); --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);}
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif; color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:var(--bg); position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; background:var(--bg); flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:50px; display:flex; align-items:center; padding:0 10px; background:var(--bg); flex:0 0 auto;}
  .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{flex:1; text-align:center; font-size:16px; font-weight:700; margin-right:40px;}
  .body{flex:1; overflow-y:auto; padding:8px 24px 110px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}

  .okrow{display:flex; align-items:center; gap:10px; background:var(--success-bg); border-radius:14px; padding:14px 16px; margin-bottom:6px;}
  .okrow iconify-icon{font-size:24px; color:var(--success); flex:0 0 auto;}
  .okrow .t{font-size:16px; font-weight:700; color:var(--ink);}
  .okrow .s{font-size:12px; color:var(--sub); margin-top:1px;}

  .shotwrap{margin-top:16px; display:flex; justify-content:center;}
  .photo{width:100%; background:#fff; border-radius:10px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,.14); position:relative;}
  .photo:before{content:'촬영됨'; position:absolute; top:12px; right:12px; font-size:10px; font-weight:700; color:#fff; background:rgba(25,31,40,.55); padding:3px 8px; border-radius:6px;}
  .bill .h{font-size:16px; font-weight:800; color:#1f6feb;}
  .bill .sub{font-size:11px; color:#888; margin:4px 0 16px;}
  .bill .r{height:10px; background:#eef0f2; border-radius:2px; margin-bottom:9px;}
  .bill .r.s{width:60%;} .bill .r.m{width:82%;}
  .bill .box{border:1.5px solid #e24b4a; border-radius:6px; padding:11px; margin-top:16px;}
  .bill .box .bt{font-size:11px; color:#e24b4a; font-weight:700;}
  .bill .box .bv{font-size:18px; font-weight:800; color:#333; margin-top:4px;}
  .bill .r2{height:10px; background:#eef0f2; border-radius:2px; margin-top:16px;}

  .tip{font-size:13px; color:var(--sub); text-align:center; margin-top:18px; line-height:1.6;}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 24px 28px; background:linear-gradient(180deg, rgba(244,245,247,0), var(--bg) 30%); display:flex; gap:10px;}
  .btn-secondary{flex:0 0 auto; width:120px; height:56px; border:1.5px solid var(--border); border-radius:15px; font-size:16px; font-weight:700; color:var(--sub); background:#fff; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px;}
  .btn-secondary iconify-icon{font-size:19px;}
  .btn-primary{flex:1; height:56px; border:none; border-radius:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow);}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span class="time">9:41</span><span class="stat">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
  </span></div>
  <div class="topbar"><div class="back" onclick="history.back()">‹</div><div class="ttl">촬영 확인</div></div>

  <div class="body">
    <div class="okrow">
      <iconify-icon icon="mingcute:check-circle-fill"></iconify-icon>
      <div><div class="t">촬영이 잘 됐어요</div><div class="s">금액 · 계좌 글씨가 선명한지 확인해주세요</div></div>
    </div>

    <div class="shotwrap">
      <div class="photo bill">
        <div class="h">2024년 8월 주민세 (개인분)</div>
        <div class="sub">세종특별자치시 · 납부장소 전국 금융기관</div>
        <div class="r m"></div><div class="r s"></div><div class="r"></div>
        <div class="box"><div class="bt">납부 금액</div><div class="bv">142,211 원</div></div>
        <div class="r2"></div>
      </div>
    </div>

    <p class="tip">흐리거나 잘렸다면 다시 찍어주세요.</p>
  </div>

  <div class="footer">
    <button class="btn-secondary" onclick="location.href='13_촬영.html'"><iconify-icon icon="mingcute:refresh-2-fill"></iconify-icon>다시 찍기</button>
    <button class="btn-primary" onclick="location.href='12_1_결제수단.html'">이 사진 사용하기</button>
  </div>
</div>
</body>
</html>
