<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>랜선페이 사용방법</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF; --page-bg:#c9cdd4; --bg:#F4F5F6; --line:#ECEEF1; --border:#B1B8BE; --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary)); --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);}
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',sans-serif; color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:var(--bg); position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; background:var(--bg); flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:52px; display:flex; align-items:center; padding:0 10px; background:var(--bg); flex:0 0 auto;}
  .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{flex:1; text-align:center; font-size:16px; font-weight:700; margin-right:40px;}
  .body{flex:1; overflow-y:auto; padding:8px 16px 40px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}
  .q{font-size:22px; font-weight:700; letter-spacing:-.3px; margin:6px 8px 4px;}
  .qs{font-size:14px; color:var(--sub); margin:0 8px 18px;}
  .sec-h{font-size:14px; font-weight:700; color:var(--sub); margin:24px 8px 10px;}

  /* 이용 순서 */
  .steps{background:#fff; border-radius:16px; padding:6px 18px; box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .step{display:flex; gap:14px; padding:16px 0; border-top:1px solid var(--line);}
  .step:first-child{border-top:none;}
  .step .no{width:26px; height:26px; border-radius:50%; background:var(--primary-50); color:var(--primary-dark); font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex:0 0 auto; margin-top:1px;}
  .step .t .n{font-size:15px; font-weight:700; color:var(--ink);}
  .step .t .s{font-size:13px; color:var(--sub); margin-top:3px; line-height:1.55;}

  /* 유형별 서류 */
  .doclist{background:#fff; border-radius:16px; padding:2px 18px; box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .drow{display:flex; align-items:center; gap:12px; padding:14px 0; border-top:1px solid var(--line); cursor:pointer;}
  .drow:first-child{border-top:none;}
  .drow .n{flex:1; font-size:15px; font-weight:600; color:var(--ink);}
  .drow .s{font-size:12px; color:var(--placeholder);}
  .drow .gv{color:var(--icon-off); font-size:18px;}
  .hint{font-size:12px; color:var(--placeholder); margin:12px 8px 0; line-height:1.6;}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span class="time">9:41</span><span class="stat">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
  </span></div>
  <div class="topbar"><div class="back" onclick="history.back()">‹</div><div class="ttl">사용방법</div></div>

  <div class="body">
    <div class="q">랜선페이 이렇게 써요</div>
    <div class="qs">현금으로 내던 돈을 카드로 내는 4단계예요.</div>

    <div class="steps">
      <div class="step"><span class="no">1</span><div class="t"><div class="n">결제 정보 입력</div><div class="s">무엇을 · 얼마를 · 어디로 보낼지 하나씩 입력해요.</div></div></div>
      <div class="step"><span class="no">2</span><div class="t"><div class="n">서류 촬영 · 첨부</div><div class="s">계약서나 고지서를 찍어서 올려요. 유형마다 필요한 서류가 달라요.</div></div></div>
      <div class="step"><span class="no">3</span><div class="t"><div class="n">카드로 결제</div><div class="s">카드 선택하고 할부까지 정하면 끝이에요.</div></div></div>
      <div class="step"><span class="no">4</span><div class="t"><div class="n">확인 후 입금</div><div class="s">담당자가 서류를 확인한 뒤 받는 분에게 입금해요. 승인되지 않으면 결제는 자동 취소돼요.</div></div></div>
    </div>

    <div class="sec-h">무엇을 낼 때 어떤 서류가 필요한가요?</div>
    <div class="doclist" id="doclist"></div>
    <p class="hint">유형을 누르면 필요한 서류를 자세히 볼 수 있어요.</p>
  </div>
</div>
<script>
const TYPES=[
  ['부동산 임대차','월세 · 계약금 · 보증금'],
  ['별도 관리비','아파트 · 상가 관리비'],
  ['인테리어','공사 · 수리 · 시공'],
  ['복비','부동산 중개수수료'],
  ['이사비','용달 · 포장이사'],
  ['청소비','입주 · 정기 청소'],
  ['B2B 매입대금','거래처 · 식자재 대금'],
  ['렌트료 · 렌탈료','자동차 · 가전'],
  ['보험료','건강 · 연금 · 화재'],
  ['인건비 · 용역비','급여 · 알바 · 프리랜서'],
  ['교육비','학원 · 수강료 · 과외'],
  ['기타','그 밖의 납부'],
];
document.getElementById('doclist').innerHTML = TYPES.map(t=>
  '<div class="drow" onclick="location.href=\'11_확인서류안내.html?t=\'+encodeURIComponent(\''+t[0]+'\')"><span class="n">'+t[0]+'</span><span class="s">'+t[1]+'</span><iconify-icon class="gv" icon="mingcute:right-line"></iconify-icon></div>'
).join('');
</script>
</body>
</html>
