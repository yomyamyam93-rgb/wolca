<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>예약 결제 · 결제일 선택</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF; --page-bg:#c9cdd4; --bg:#FFFFFF; --line:#ECEEF1; --border:#B1B8BE; --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;
    --sun:#E5484D; --sat:#3182F6;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary)); --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);}
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',sans-serif; color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:#fff; position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700;} .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:50px; display:flex; align-items:center; padding:0 10px; flex:0 0 auto;}
  .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{flex:1; text-align:center; font-size:16px; font-weight:700; margin-right:40px;}
  .prog{height:4px; background:var(--line); margin:0 24px 6px; border-radius:2px; overflow:hidden;} .prog i{display:block; height:100%; width:14%; background:var(--primary); border-radius:2px;}
  .body{flex:1; overflow-y:auto; padding:14px 24px 110px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}
  .q{font-size:22px; font-weight:700; letter-spacing:-.3px;}
  .qs{font-size:14px; color:var(--sub); margin:10px 0 22px;}

  .cal{background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px 14px 12px;}
  .cal-h{display:flex; align-items:center; justify-content:center; gap:18px; font-size:16px; font-weight:700; margin-bottom:14px;}
  .cal-h iconify-icon{color:var(--icon-off); font-size:22px;}
  .wk{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px;}
  .wk span{text-align:center; font-size:12px; font-weight:600; color:var(--placeholder); padding:4px 0;}
  .wk .sun{color:var(--sun);} .wk .sat{color:var(--sat);}
  .dates{display:grid; grid-template-columns:repeat(7,1fr); gap:2px 0; justify-items:center;}
  .dc{width:38px; height:38px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; color:var(--ink); border-radius:50%; cursor:pointer; margin:2px 0;}
  .dc.empty{cursor:default;}
  .dc.past{color:#D1D6DB; cursor:default;}
  .dc.on{background:var(--primary); color:#fff;}

  .lastchip{border:1.5px solid var(--line); border-radius:12px; padding:14px; text-align:center; font-size:14px; font-weight:600; color:var(--sub); cursor:pointer; margin-top:12px;}
  .lastchip.on{border-color:var(--primary); background:var(--primary-50); color:var(--primary-dark);}

  .resd{display:flex; align-items:center; gap:9px; background:var(--primary-50); border-radius:12px; padding:14px; margin-top:16px;}
  .resd iconify-icon{color:var(--primary); font-size:20px; flex:0 0 auto;}
  .resd .rt{font-size:13px; color:var(--primary-dark); font-weight:600; line-height:1.5;}
  .resd .rt b{color:var(--ink);}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 24px 30px; background:linear-gradient(180deg, rgba(255,255,255,0), #fff 30%);}
  .btn-primary{width:100%; height:56px; border:none; border-radius:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow);}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span class="time">9:41</span><span class="stat">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
  </span></div>
  <div class="topbar"><div class="back" onclick="history.back()">‹</div><div class="ttl">예약 결제</div></div>
  <div class="prog"><i></i></div>

  <div class="body">
    <div class="q">매월 며칠에 낼까요?</div>
    <div class="qs">고른 날짜에 매달 자동으로 결제돼요. 첫 결제일부터 시작해요.</div>

    <div class="cal">
      <div class="cal-h"><iconify-icon icon="mingcute:left-line"></iconify-icon><span>2026년 7월</span><iconify-icon icon="mingcute:right-line"></iconify-icon></div>
      <div class="wk"><span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span></div>
      <div class="dates" id="dates"></div>
    </div>

    <div class="lastchip" id="lastchip" onclick="pickLast()">매월 말일(마지막 날)에 낼게요</div>

    <div class="resd">
      <iconify-icon icon="mingcute:calendar-2-fill"></iconify-icon>
      <div class="rt" id="resd">매월 <b>25일</b>에 자동으로 결제돼요 · 첫 결제 <b>7월 25일</b></div>
    </div>
  </div>

  <div class="footer"><button class="btn-primary" onclick="location.href='10_1_유형선택.html'">다음</button></div>
</div>
<script>
const FIRST_WEEKDAY=3, DAYS=31, TODAY=9; // 2026년 7월 1일=수요일, 오늘 9일
let picked=25;
(function(){
  let h='';
  for(let i=0;i<FIRST_WEEKDAY;i++) h+='<div class="dc empty"></div>';
  for(let d=1;d<=DAYS;d++){
    if(d<TODAY){ h+='<div class="dc past">'+d+'</div>'; }
    else{ h+='<div class="dc'+(d===picked?' on':'')+'" onclick="pickDate(this,'+d+')">'+d+'</div>'; }
  }
  document.getElementById('dates').innerHTML=h;
})();
function pickDate(el,d){
  document.querySelectorAll('.dc').forEach(c=>c.classList.remove('on'));
  document.getElementById('lastchip').classList.remove('on');
  el.classList.add('on'); picked=d;
  document.getElementById('resd').innerHTML='매월 <b>'+d+'일</b>에 자동으로 결제돼요 · 첫 결제 <b>7월 '+d+'일</b>';
}
function pickLast(){
  document.querySelectorAll('.dc').forEach(c=>c.classList.remove('on'));
  document.getElementById('lastchip').classList.add('on');
  document.getElementById('resd').innerHTML='매월 <b>말일</b>에 자동으로 결제돼요 · 첫 결제 <b>7월 31일</b>';
}
</script>
</body>
</html>
