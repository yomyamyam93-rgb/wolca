<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결제 등록 3 · 계좌 인증 완료</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF; --page-bg:#c9cdd4; --bg:#FFFFFF; --line:#ECEEF1; --border:#B1B8BE; --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1; --success:#059669;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary)); --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);}
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',sans-serif; color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:#fff; position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700;} .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:50px; display:flex; align-items:center; padding:0 10px; flex:0 0 auto;}
  .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{flex:1; text-align:center; font-size:16px; font-weight:700; margin-right:40px;}
  .prog{height:4px; background:var(--line); margin:0 24px 6px; border-radius:2px; overflow:hidden;} .prog i{display:block; height:100%; width:75%; background:var(--primary); border-radius:2px;}
  .body{flex:1; padding:14px 24px;}
  .q{font-size:22px; font-weight:700; letter-spacing:-.3px; margin-bottom:20px;}
  .lbl{font-size:13px; font-weight:700; color:var(--sub); margin:0 2px 8px;}

  .selrow{display:flex; align-items:center; justify-content:space-between; height:56px; border:1.5px solid var(--border); border-radius:14px; padding:0 16px; cursor:pointer; margin-bottom:16px;}
  .selrow .bn{font-size:17px; font-weight:600; color:var(--ink);}
  .selrow .bn.ph{color:var(--placeholder); font-weight:400;}
  .selrow iconify-icon{color:var(--icon-off); font-size:22px;}

  .inbox{position:relative;}
  .inbox input{width:100%; height:56px; border:1.5px solid var(--border); border-radius:14px; padding:0 108px 0 16px; font-size:17px; font-weight:600; color:var(--ink); font-family:inherit; background:#fff;}
  .inbox input::placeholder{color:var(--placeholder); font-weight:400;}
  .inbox input:focus{outline:none; border:2px solid var(--primary);}
  .inbox .side{position:absolute; right:8px; top:8px; height:40px; padding:0 14px; border:none; border-radius:10px; background:var(--primary); color:#fff; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;}

  .verified{display:flex; align-items:center; gap:11px; background:var(--primary-50); border-radius:14px; padding:15px 16px; margin-top:14px;}
  .verified iconify-icon{font-size:23px; color:var(--primary); flex:0 0 auto;}
  .verified .vl{font-size:12px; color:var(--sub);}
  .verified .vn{font-size:17px; font-weight:700; color:var(--ink); margin-top:1px;}
  .hint{font-size:12px; color:var(--placeholder); margin-top:14px; line-height:1.5;}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 24px 30px;}
  .btn-primary{width:100%; height:56px; border:none; border-radius:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow);}

  /* 은행 선택 바텀시트 */
  .dim{position:absolute; inset:0; background:rgba(15,20,30,.45); opacity:0; pointer-events:none; transition:.25s; z-index:5;}
  .dim.on{opacity:1; pointer-events:auto;}
  .sheet{position:absolute; left:0; right:0; bottom:0; background:#fff; border-radius:22px 22px 0 0; padding:10px 20px 24px; z-index:6; transform:translateY(100%); transition:transform .3s cubic-bezier(.2,.8,.2,1); box-shadow:0 -8px 30px rgba(0,0,0,.14); max-height:76%; display:flex; flex-direction:column;}
  .sheet.on{transform:translateY(0);}
  .sheet .handle{width:40px; height:5px; border-radius:3px; background:#E1E5EA; margin:2px auto 14px;}
  .sheet h3{font-size:18px; font-weight:700; letter-spacing:-.3px; margin:0 4px 14px;}
  .bankgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; overflow-y:auto; scrollbar-width:none;}
  .bankgrid::-webkit-scrollbar{display:none;}
  .bankopt{height:82px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; border:1.5px solid var(--line); border-radius:12px; cursor:pointer;}
  .bankopt.on{border-color:var(--primary); background:var(--primary-50);}
  .blogo{width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; line-height:1;}
  .bnm{font-size:12px; font-weight:600; color:var(--ink);}
  .selrow .blogo{width:26px; height:26px; border-radius:8px; margin-right:10px; font-size:11px;}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span class="time">9:41</span><span class="stat">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
  </span></div>
  <div class="topbar"><div class="back" onclick="location.href='10_2_금액.html'">‹</div><div class="ttl">결제 등록</div></div>
  <div class="prog"><i></i></div>

  <div class="body">
    <div class="q">어디로 보낼까요?</div>

    <div class="lbl">은행</div>
    <div class="selrow" onclick="openBank()">
      <span style="display:flex; align-items:center; min-width:0;">
        <span class="blogo" id="bankLogo" style="background:#FFBC00;color:#3B2B00;font-size:11px">KB</span>
        <span class="bn" id="bankName">국민</span>
      </span>
      <iconify-icon icon="mingcute:down-line"></iconify-icon>
    </div>

    <div class="lbl">계좌번호</div>
    <div class="inbox">
      <input id="acc" inputmode="numeric" placeholder="계좌번호 입력" value="123456-78-901234">
      <button class="side" onclick="verify()">계좌 인증</button>
    </div>

    <div class="verified" id="result">
      <iconify-icon icon="mingcute:check-circle-fill"></iconify-icon>
      <div><div class="vl">받는 분 (예금주)</div><div class="vn" id="payee">대성부동산</div></div>
    </div>

    <p class="hint">상대방 동의 없이도 돼요. 인증하면 받는 분이 자동으로 확인돼요.</p>
  </div>

  <div class="footer"><button class="btn-primary" onclick="location.href='10_4_이름.html'">다음</button></div>

  <!-- 은행 선택 시트 -->
  <div class="dim" id="dim" onclick="closeBank()"></div>
  <div class="sheet" id="sheet">
    <div class="handle"></div>
    <h3>은행을 선택하세요</h3>
    <div class="bankgrid" id="bankgrid"></div>
  </div>
</div>
<script>
const BANKS=[
  {n:'국민', c:'#FFBC00', m:'KB', t:'#3B2B00'},
  {n:'신한', c:'#1F4EEB', m:'신'},
  {n:'우리', c:'#0067AC', m:'우'},
  {n:'하나', c:'#00857F', m:'하나'},
  {n:'농협', c:'#19A94C', m:'N'},
  {n:'기업', c:'#00589F', m:'IBK'},
  {n:'카카오뱅크', c:'#FFCD00', m:'k', t:'#3B1E1E'},
  {n:'토스뱅크', c:'#0064FF', m:'toss'},
  {n:'케이뱅크', c:'#3D2AFF', m:'K'},
  {n:'SC제일', c:'#0E7C61', m:'SC'},
  {n:'새마을금고', c:'#EC1C24', m:'MG'},
  {n:'우체국', c:'#E5390E', m:'우'},
  {n:'부산', c:'#E6002D', m:'부'},
  {n:'대구', c:'#007DC5', m:'iM'},
  {n:'수협', c:'#0079C1', m:'수'},
  {n:'신협', c:'#003399', m:'신협'}
];
function markFs(m){ return m.length<=1?'16px':(m.length<=2?'13px':'10px'); }
(function(){
  document.getElementById('bankgrid').innerHTML = BANKS.map(function(b){
    return '<div class="bankopt" data-n="'+b.n+'" data-c="'+b.c+'" data-m="'+b.m+'" data-t="'+(b.t||'#fff')+'" onclick="pickBank(this)">'
      +'<span class="blogo" style="background:'+b.c+';color:'+(b.t||'#fff')+';font-size:'+markFs(b.m)+'">'+b.m+'</span>'
      +'<span class="bnm">'+b.n+'</span></div>';
  }).join('');
})();
function openBank(){ document.getElementById('dim').classList.add('on'); document.getElementById('sheet').classList.add('on'); }
function closeBank(){ document.getElementById('dim').classList.remove('on'); document.getElementById('sheet').classList.remove('on'); }
function pickBank(el){
  document.querySelectorAll('.bankopt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const n=document.getElementById('bankName'); n.textContent=el.dataset.n; n.classList.remove('ph');
  const lg=document.getElementById('bankLogo');
  lg.textContent=el.dataset.m; lg.style.background=el.dataset.c; lg.style.color=el.dataset.t; lg.style.fontSize=markFs(el.dataset.m); lg.style.display='flex';
  document.getElementById('result').style.display='none'; // 은행 바꾸면 재인증
  setTimeout(closeBank,130);
}
function verify(){
  const bank=document.getElementById('bankName');
  if(bank.classList.contains('ph')){ alert('은행을 먼저 선택해주세요'); return; }
  document.getElementById('result').style.display='flex';
}
</script>
</body>
</html>
