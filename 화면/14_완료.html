<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결제 완료</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF;
    --page-bg:#c9cdd4; --bg:#FFFFFF; --line:#ECEEF1; --border:#B1B8BE;
    --tile:#F2F4F6; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary));
    --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',sans-serif; color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:#fff; position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}

  .body{flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 24px 120px; overflow-y:auto; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}
  .chk{margin:56px 0 24px;}
  .chk iconify-icon{font-size:88px; color:var(--primary);}
  h1{font-size:24px; font-weight:700; text-align:center; letter-spacing:-.3px;}
  .lead{font-size:14px; color:var(--sub); text-align:center; margin-top:12px; line-height:1.6;}

  .receipt{width:100%; background:var(--tile); border-radius:16px; padding:18px; margin-top:32px;}
  .rrow{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .rrow:last-child{margin-bottom:0;}
  .rrow .l{font-size:14px; color:var(--sub);}
  .rrow .v{font-size:14px; font-weight:700; color:var(--ink);}
  .rrow.big .v{font-size:16px; color:var(--primary-dark);}
  .rdiv{border-top:1px solid #E3E7EC; margin:4px 0 14px;}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 24px 30px; background:#fff;}
  .btn-primary{width:100%; height:56px; border:none; border-radius:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow);}
  .sub-btn{display:block; width:100%; text-align:center; background:none; border:none; font-family:inherit; font-size:14px; color:var(--placeholder); margin-top:14px; cursor:pointer;}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="stat">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><path d="M8.5 5.5c1.5 0 2.9.6 3.9 1.6l-1.4 1.4c-.6-.7-1.5-1-2.5-1s-1.9.4-2.5 1L4.6 7.1C5.6 6.1 7 5.5 8.5 5.5z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
    </span>
  </div>

  <div class="body">
    <div class="chk"><iconify-icon icon="mingcute:check-circle-fill"></iconify-icon></div>
    <h1>결제가 완료됐어요</h1>
    <p class="lead">상대에게 <b>오늘 680,000원</b>이 즉시 송금됐어요.<br>카드값은 다음 달에 나가요.</p>

    <div class="receipt">
      <div class="rrow"><span class="l">받는 곳</span><span class="v">대성부동산</span></div>
      <div class="rrow"><span class="l">결제 유형</span><span class="v">복비</span></div>
      <div class="rrow"><span class="l">결제 카드</span><span class="v">삼성 Deep Dream · 3개월</span></div>
      <div class="rdiv"></div>
      <div class="rrow"><span class="l">신청 금액</span><span class="v">680,000원</span></div>
      <div class="rrow"><span class="l">수수료 (4%)</span><span class="v">27,200원</span></div>
      <div class="rrow big"><span class="l">총 결제금액</span><span class="v">707,200원</span></div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" onclick="location.href='9_홈_개인.html'">홈으로</button>
    <button class="sub-btn" onclick="alert('영수증 (준비 중)')">결제 영수증 보기</button>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
