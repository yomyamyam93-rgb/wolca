<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결제 등록 (하나씩 진행)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF;
    --page-bg:#c9cdd4; --bg:#FFFFFF; --line:#ECEEF1; --border:#B1B8BE;
    --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary));
    --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
       color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:#fff; position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700; letter-spacing:.3px;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:52px; display:flex; align-items:center; padding:0 10px; flex:0 0 auto;}
  .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{flex:1; text-align:center; font-size:16px; font-weight:700; margin-right:40px;}

  .body{flex:1; overflow-y:auto; padding:8px 24px 130px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}

  .step{margin-bottom:26px; display:none;}
  .step.on{display:block; animation:fadeup .32s ease;}
  @keyframes fadeup{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}
  .q{font-size:20px; font-weight:700; letter-spacing:-.3px; margin-bottom:14px; line-height:1.4;}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{border:1.5px solid var(--line); background:#fff; color:var(--sub); font-family:inherit; font-size:15px; font-weight:600; padding:11px 16px; border-radius:12px; cursor:pointer;}
  .chip.on{border-color:var(--primary); background:var(--primary-50); color:var(--primary-dark);}

  .inbox{position:relative;}
  .inbox input{width:100%; height:56px; border:1.5px solid var(--border); border-radius:14px; padding:0 16px; font-size:17px; font-weight:600; color:var(--ink); font-family:inherit; background:#fff;}
  .inbox input::placeholder{color:var(--placeholder); font-weight:400;}
  .inbox input:focus{outline:none; border:2px solid var(--primary); padding:0 15px;}
  .inbox.amt input{text-align:right; font-size:22px; font-weight:700; padding-right:44px;}
  .inbox .won{position:absolute; right:16px; top:50%; transform:translateY(-50%); font-size:17px; font-weight:700; color:var(--sub);}
  .inbox .side{position:absolute; right:8px; top:8px; height:40px; padding:0 14px; border:none; border-radius:10px; background:var(--primary-50); color:var(--primary-dark); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;}
  .stack{display:flex; flex-direction:column; gap:10px;}
  .hint{font-size:12px; color:var(--placeholder); margin-top:8px;}

  .upload{display:flex; align-items:center; gap:12px; border:1.5px dashed var(--border); border-radius:14px; padding:16px; cursor:pointer;}
  .upload .ic{width:36px; height:36px; border-radius:10px; background:var(--tile); display:flex; align-items:center; justify-content:center; color:var(--primary); font-size:20px; flex:0 0 auto;}
  .upload .t{flex:1;} .upload .t .n{font-size:14px; font-weight:600;} .upload .t .s{font-size:12px; color:var(--placeholder); margin-top:1px;}
  .upload .req{font-size:11px; font-weight:700; color:var(--danger, #DC2626);}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 24px 30px; background:linear-gradient(180deg, rgba(255,255,255,0), #fff 28%);}
  .btn-primary{width:100%; height:56px; border:none; border-radius:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer;
    background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow); display:none;}
  .btn-primary.on{display:block; animation:fadeup .3s;}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="stat">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><path d="M8.5 5.5c1.5 0 2.9.6 3.9 1.6l-1.4 1.4c-.6-.7-1.5-1-2.5-1s-1.9.4-2.5 1L4.6 7.1C5.6 6.1 7 5.5 8.5 5.5z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
    </span>
  </div>
  <div class="topbar"><div class="back"><iconify-icon icon="mingcute:left-line"></iconify-icon></div><div class="ttl">결제 등록</div></div>

  <div class="body" id="body">

    <!-- 1. 유형 (처음부터 보임) -->
    <div class="step on" id="s1">
      <div class="q">무엇을 결제할까요?</div>
      <div class="chips">
        <button class="chip" onclick="pickType(this)">월세</button>
        <button class="chip" onclick="pickType(this)">관리비</button>
        <button class="chip" onclick="pickType(this)">임대료</button>
        <button class="chip" onclick="pickType(this)">복비</button>
        <button class="chip" onclick="pickType(this)">세금</button>
        <button class="chip" onclick="pickType(this)">기타</button>
      </div>
    </div>

    <!-- 2. 금액 -->
    <div class="step" id="s2">
      <div class="q">얼마를 보낼까요?</div>
      <div class="inbox amt">
        <input type="text" inputmode="numeric" placeholder="0" oninput="onAmt(this)">
        <span class="won">원</span>
      </div>
    </div>

    <!-- 3. 받는 계좌 -->
    <div class="step" id="s3">
      <div class="q">어디로 보낼까요?</div>
      <div class="stack">
        <div class="inbox">
          <input placeholder="받는 분 (예: 김대성)" oninput="onName(this,'r1')">
        </div>
        <div class="inbox">
          <input id="acc" placeholder="은행 + 계좌번호" oninput="onAcc(this)">
          <button class="side">계좌 인증</button>
        </div>
      </div>
      <p class="hint">상대방 동의 없이도 돼요. 인증하면 오타 걱정 없어요.</p>
    </div>

    <!-- 4. 통장에 찍힐 이름 -->
    <div class="step" id="s4">
      <div class="q">상대 통장에 찍힐 이름</div>
      <div class="inbox">
        <input placeholder="예: 홍길동" oninput="onName(this,'r2')">
        <button class="side">나</button>
      </div>
    </div>

    <!-- 5. 증빙 서류 -->
    <div class="step" id="s5">
      <div class="q">증빙 서류를 올려주세요</div>
      <div class="upload" onclick="onUpload()">
        <div class="ic"><iconify-icon icon="mingcute:file-fill"></iconify-icon></div>
        <div class="t"><div class="n"><span class="req">[필수]</span> 계약서 · 영수증 · 명함</div><div class="s" id="upstat">사진 또는 파일 첨부</div></div>
        <iconify-icon icon="mingcute:right-line" style="color:var(--icon-off)"></iconify-icon>
      </div>
      <p class="hint">결제 검토 후, 상대 계좌로 3초 안에 송금돼요.</p>
    </div>

  </div>

  <div class="footer">
    <button class="btn-primary" id="submit" onclick="toast('카드 선택 화면으로 (다음 단계)')">카드로 결제하기</button>
  </div>
</div>

<script>
function reveal(id){
  const el=document.getElementById(id);
  if(el.classList.contains('on')) return;
  el.classList.add('on');
  setTimeout(()=>{ document.getElementById('body').scrollTo({top:document.getElementById('body').scrollHeight, behavior:'smooth'}); }, 60);
}
function pickType(btn){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  reveal('s2');
}
function onAmt(inp){
  let n=parseInt(inp.value.replace(/[^0-9]/g,''))||0;
  inp.value = n ? n.toLocaleString() : '';
  if(n>0) reveal('s3');
}
function onName(inp,tag){ /* 이름 입력만으론 다음 안 넘김(계좌가 핵심) */ }
function onAcc(inp){ if(inp.value.trim().length>=4) reveal('s4'); }
function done4(){ reveal('s5'); }
function onUpload(){
  document.getElementById('upstat').textContent = '계약서.jpg 첨부됨 ✓';
  document.getElementById('upstat').style.color = 'var(--success, #059669)';
  document.getElementById('submit').classList.add('on');
  setTimeout(()=>{ document.getElementById('body').scrollTo({top:document.getElementById('body').scrollHeight, behavior:'smooth'}); },60);
}
/* 통장 이름 입력하면 증빙 단계로 */
document.querySelector('#s4 input').addEventListener('input', function(){ if(this.value.trim()) reveal('s5'); });
function toast(msg){
  let t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText="position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#191F28;color:#fff;padding:12px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:99;opacity:0;transition:.2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)";
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.style.opacity='1');
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),200)},1500);
}
</script>
</body>
</html>
