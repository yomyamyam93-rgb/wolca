<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>랜선페이 — 결제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF;
    --page-bg:#c9cdd4; --bg:#F4F5F6; --line:#ECEEF1; --border:#B1B8BE;
    --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary));
    --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
       color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:var(--bg); position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; background:var(--bg); flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700; letter-spacing:.3px;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:52px; display:flex; align-items:center; padding:0 10px; background:var(--bg); flex:0 0 auto;}
  .topbar .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{font-size:18px; font-weight:700; letter-spacing:-.3px;}

  .body{flex:1; overflow-y:auto; padding:4px 16px 122px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}
  .sec-h{font-size:14px; font-weight:700; color:var(--sub); margin:20px 4px 10px;}
  .card{background:#fff; border-radius:16px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.04);}

  /* 결제 대상 요약 */
  .target{display:flex; align-items:center; gap:13px; padding:16px;}
  .target .tic{width:44px; height:44px; border-radius:13px; background:var(--tile); display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .target .tic iconify-icon{font-size:24px; color:var(--primary);}
  .target .tt{flex:1; min-width:0;}
  .target .tt .n{font-size:16px; font-weight:700; color:var(--ink); letter-spacing:-.2px;}
  .target .tt .s{font-size:13px; color:var(--sub); margin-top:2px;}
  .target .amt{font-size:16px; font-weight:700; color:var(--ink);}

  /* 결제 방법 세그먼트 */
  .seg{display:flex; background:#E8EBEF; border-radius:12px; padding:4px; margin-bottom:14px;}
  .seg button{flex:1; border:none; background:transparent; font-family:inherit; font-size:14px; font-weight:700; color:var(--sub); padding:9px 0; border-radius:9px; cursor:pointer;}
  .seg button.on{background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.08);}

  /* 카드 선택 행 */
  .cardrow{display:flex; align-items:center; gap:12px; cursor:pointer;}
  .cardrow .cchip{width:44px; height:32px; border-radius:8px; background:linear-gradient(135deg,#4B7BF5,#2560E8); display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .cardrow .cchip iconify-icon{font-size:19px; color:#fff;}
  .cardrow .cm{flex:1; min-width:0;}
  .cardrow .cm .nm{font-size:15px; font-weight:700; color:var(--ink);}
  .cardrow .cm .no{font-size:12px; color:var(--placeholder); margin-top:1px; letter-spacing:.5px;}
  .cardrow .chg{font-size:13px; font-weight:700; color:var(--primary-dark); flex:0 0 auto;}

  .divline{border-top:1px solid var(--line); margin:16px 0;}

  /* 할부 칩 */
  .ilbl{font-size:13px; font-weight:700; color:var(--sub); margin-bottom:10px;}
  .chips{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{padding:9px 15px; border-radius:11px; background:var(--tile); font-size:14px; font-weight:600; color:var(--sub); cursor:pointer;}
  .chip.on{background:var(--primary-50); color:var(--primary-dark); box-shadow:inset 0 0 0 1.5px var(--primary);}

  .easynote{font-size:12px; color:var(--placeholder); margin-top:12px; line-height:1.5;}

  /* 반복 결제 토글 */
  .toggle-row{display:flex; align-items:center; gap:12px; padding:16px;}
  .toggle-row .tt{flex:1;}
  .toggle-row .tt .n{font-size:15px; font-weight:700; color:var(--ink);}
  .toggle-row .tt .s{font-size:12px; color:var(--placeholder); margin-top:2px;}
  .sw{width:46px; height:28px; border-radius:999px; background:#D3D8DF; position:relative; flex:0 0 auto; cursor:pointer; transition:.15s;}
  .sw:after{content:''; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:.15s; box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .sw.on{background:var(--primary);}
  .sw.on:after{left:21px;}

  /* 결제 금액 */
  .amtcard{padding:18px 16px;}
  .arow{display:flex; justify-content:space-between; align-items:center; margin-bottom:11px;}
  .arow .l{font-size:14px; color:var(--sub);}
  .arow .v{font-size:15px; font-weight:600; color:var(--ink);}
  .arow.total{margin:4px 0 0;}
  .arow.total .l{font-size:15px; font-weight:700; color:var(--ink);}
  .arow.total .v{font-size:24px; font-weight:700; color:var(--ink); letter-spacing:-.5px;}
  .flow{display:flex; align-items:flex-start; gap:9px; background:var(--primary-50); border-radius:12px; padding:13px; margin-top:16px;}
  .flow iconify-icon{font-size:19px; color:var(--primary); flex:0 0 auto; margin-top:1px;}
  .flow div{font-size:13px; color:var(--primary-dark); line-height:1.55; font-weight:600;}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 16px 26px; background:linear-gradient(180deg, rgba(244,245,247,0), var(--bg) 30%);}
  .btn-primary{width:100%; height:56px; border:none; border-radius:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow);}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="stat">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><path d="M8.5 5.5c1.5 0 2.9.6 3.9 1.6l-1.4 1.4c-.6-.7-1.5-1-2.5-1s-1.9.4-2.5 1L4.6 7.1C5.6 6.1 7 5.5 8.5 5.5z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
    </span>
  </div>
  <div class="topbar"><div class="back" onclick="history.back()">‹</div><div class="ttl">결제</div></div>

  <div class="body">

    <!-- 결제 대상 요약 -->
    <div class="card target">
      <div class="tic"><iconify-icon icon="mingcute:home-4-fill"></iconify-icon></div>
      <div class="tt"><div class="n">상가 임대료</div><div class="s">받는 분 · 명동상가 임대인</div></div>
      <div class="amt">680,000원</div>
    </div>

    <!-- 결제 방법 -->
    <div class="sec-h">어떻게 결제할까요?</div>
    <div class="card">
      <div class="seg">
        <button class="on">신용 · 체크카드</button>
        <button onclick="toast('간편결제는 준비 중이에요')">간편결제</button>
      </div>

      <div class="cardrow" onclick="toast('카드 변경은 준비 중이에요')">
        <div class="cchip"><iconify-icon icon="mingcute:bank-card-fill"></iconify-icon></div>
        <div class="cm"><div class="nm">삼성 Deep Dream</div><div class="no">•••• 4821</div></div>
        <span class="chg">변경 ›</span>
      </div>

      <div class="divline"></div>

      <div class="ilbl">할부 개월</div>
      <div class="chips">
        <div class="chip" onclick="pick(this)">일시불</div>
        <div class="chip" onclick="pick(this)">2개월</div>
        <div class="chip on" onclick="pick(this)">3개월</div>
        <div class="chip" onclick="pick(this)">6개월</div>
      </div>

      <div class="easynote">간편결제(페이코 · 토스페이 · 카카오페이)로도 낼 수 있어요.</div>
    </div>

    <!-- 반복 결제 -->
    <div class="sec-h">매달 자동으로 낼까요?</div>
    <div class="card toggle-row">
      <div class="tt"><div class="n">예약 결제로 등록</div><div class="s">매월 결제일에 자동으로 결제돼요</div></div>
      <div class="sw" onclick="this.classList.toggle('on')"></div>
    </div>

    <!-- 결제 금액 -->
    <div class="sec-h">결제 금액</div>
    <div class="card amtcard">
      <div class="arow"><span class="l">신청 금액</span><span class="v">680,000원</span></div>
      <div class="arow"><span class="l">수수료 4%</span><span class="v">27,200원</span></div>
      <div class="divline" style="margin:14px 0"></div>
      <div class="arow total"><span class="l">총 결제금액</span><span class="v">707,200원</span></div>
      <div class="flow">
        <iconify-icon icon="mingcute:shield-fill"></iconify-icon>
        <div>결제하면 담당자가 서류를 확인한 뒤 받는 분에게 입금해드려요. 승인되지 않으면 결제는 자동 취소돼요.</div>
      </div>
    </div>

  </div>

  <div class="footer">
    <button class="btn-primary" onclick="location.href='14_완료.html'">707,200원 결제하기</button>
  </div>
</div>
<script>
function pick(el){ document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); el.classList.add('on'); }
function toast(msg){
  let t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#191F28;color:#fff;padding:12px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:99;opacity:0;transition:.2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)";
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.style.opacity='1');
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),200)},1500);
}
</script>
</body>
</html>
