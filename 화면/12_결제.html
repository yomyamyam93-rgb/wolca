<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결제 (카드 · 할부 · 결제정보)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF;
    --page-bg:#c9cdd4; --bg:#F4F5F6; --line:#ECEEF1; --border:#B1B8BE;
    --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary));
    --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
       color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:var(--bg); position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; background:var(--bg); flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700; letter-spacing:.3px;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 14px; background:var(--bg); flex:0 0 auto;}
  .topbar .back{font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .scan{font-size:14px; font-weight:700; color:var(--primary-dark); cursor:pointer;}

  .body{flex:1; overflow-y:auto; padding:6px 16px 120px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}
  .card{background:#fff; border-radius:16px; padding:18px; margin-bottom:12px;}
  .sec{font-size:15px; font-weight:700; margin-bottom:14px;}

  /* 결제 수단 탭 */
  .pms{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .pm{height:52px; border:1.5px solid var(--line); border-radius:12px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:var(--sub); cursor:pointer;}
  .pm.on{border-color:var(--primary); color:var(--primary-dark); background:var(--primary-50);}
  .pm.payco{color:# E63329;}
  .pm .b{color:#191F28;} .pm .y{color:#F9C000;}

  /* 카드 */
  .cardvis{height:120px; border-radius:16px; padding:16px 18px; color:#fff; background:linear-gradient(135deg,#3d7bf5,#1e59df); display:flex; flex-direction:column; justify-content:space-between; margin-bottom:10px;}
  .cardvis .tp{display:flex; justify-content:space-between; align-items:flex-start;}
  .cardvis .tag{font-size:11px; font-weight:700; background:rgba(255,255,255,.22); padding:3px 8px; border-radius:6px;}
  .cardvis .brand{font-size:11px; opacity:.9;}
  .cardvis .nm{font-size:17px; font-weight:700;}
  .cardvis .no{font-size:13px; opacity:.9; letter-spacing:1px;}
  .cdots{display:flex; justify-content:center; gap:6px; margin-bottom:14px;}
  .cdot{width:6px; height:6px; border-radius:3px; background:#D3DAE6;}
  .cdot.on{background:var(--primary); width:16px;}

  .selrow{display:flex; align-items:center; justify-content:space-between; height:52px; border:1.5px solid var(--line); border-radius:12px; padding:0 16px; font-size:15px; font-weight:600;}
  .selrow .lb{color:var(--sub); font-size:13px;}
  .selrow iconify-icon{color:var(--icon-off);}

  .toggle-row{display:flex; align-items:center; gap:10px; padding:14px 2px;}
  .toggle-row .chk iconify-icon{font-size:24px; color:var(--primary);}
  .toggle-row .t{flex:1; font-size:15px; font-weight:600;}
  .toggle-row .s{font-size:12px; color:var(--placeholder);}

  /* 결제 정보 */
  .inforow{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .inforow .l{font-size:14px; color:var(--sub);}
  .inforow .v{font-size:15px; font-weight:700; color:var(--ink);}
  .inforow.total .l{color:var(--ink); font-weight:700;}
  .inforow.total .v{font-size:18px; color:var(--primary-dark);}
  .inforow.point .l, .inforow.point .v{color:var(--primary);}
  .divline{border-top:1px solid var(--line); margin:4px 0 14px;}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 16px 26px; background:linear-gradient(180deg, rgba(244,245,247,0), var(--bg) 30%);}
  .btn-primary{width:100%; height:56px; border:none; border-radius:14px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow);}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="stat">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><path d="M8.5 5.5c1.5 0 2.9.6 3.9 1.6l-1.4 1.4c-.6-.7-1.5-1-2.5-1s-1.9.4-2.5 1L4.6 7.1C5.6 6.1 7 5.5 8.5 5.5z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
    </span>
  </div>
  <div class="topbar"><div class="back">‹</div><div class="scan">고지서 스캔 ›</div></div>

  <div class="body">
    <!-- 결제 수단 -->
    <div class="card">
      <div class="sec">결제 수단</div>
      <div class="pms">
        <div class="pm on">신용 · 체크카드</div>
        <div class="pm" style="color:#E63329">PAYCO</div>
        <div class="pm"><span style="color:#3182F6">toss</span><span class="b">pay</span></div>
        <div class="pm"><span class="y">kakao</span><span class="b">pay</span></div>
      </div>
    </div>

    <!-- 카드 -->
    <div class="card">
      <div class="cardvis">
        <div class="tp"><span class="tag">추천 카드</span><span class="brand">SAMSUNG CARD</span></div>
        <div><div class="nm">삼성 Deep Dream</div><div class="no">**** **** **** 4821</div></div>
      </div>
      <div class="cdots"><span class="cdot on"></span><span class="cdot"></span><span class="cdot"></span></div>
      <div class="selrow"><span><span class="lb">할부</span> &nbsp; 3개월</span><iconify-icon icon="mingcute:down-line"></iconify-icon></div>
    </div>

    <!-- 반복 결제 -->
    <div class="card" style="padding:6px 18px">
      <div class="toggle-row">
        <span class="chk"><iconify-icon icon="mingcute:check-circle-fill"></iconify-icon></span>
        <span class="t">반복 결제 추가</span>
        <span class="s">매월 자동 알림</span>
      </div>
    </div>

    <!-- 결제 정보 -->
    <div class="card">
      <div class="sec">결제 정보</div>
      <div class="inforow"><span class="l">신청 금액</span><span class="v">680,000원</span></div>
      <div class="inforow"><span class="l">수수료 (4%)</span><span class="v">27,200원</span></div>
      <div class="divline"></div>
      <div class="inforow total"><span class="l">총 결제금액</span><span class="v">707,200원</span></div>
      <div class="inforow point" style="margin-bottom:0"><span class="l">적립 예정</span><span class="v">6,660원</span></div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">707,200원 결제하기</button>
  </div>
</div>
</body>
</html>
