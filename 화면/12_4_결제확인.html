<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결제 4 · 결제 확인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--primary:#2563EB; --primary-dark:#1D4ED8; --primary-50:#EFF4FF; --page-bg:#c9cdd4; --bg:#F4F5F6; --line:#ECEEF1; --border:#B1B8BE; --tile:#EEF1F4; --icon-off:#B0B8C1; --sub:#4E5968; --ink:#191F28; --placeholder:#8B95A1;
    --primary-grad:linear-gradient(180deg, color-mix(in srgb, var(--primary) 82%, #ffffff), var(--primary)); --btn-shadow:0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.18);}
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif; color:var(--ink); background:var(--page-bg); display:flex; justify-content:center; align-items:flex-start; padding:24px 0; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .phone{width:390px; height:844px; max-width:100%; background:var(--bg); position:relative; display:flex; flex-direction:column; border-radius:46px; overflow:hidden; box-shadow:0 16px 50px rgba(0,0,0,.28);}
  iconify-icon{display:inline-block;}
  .statusbar{height:47px; display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 30px; background:var(--bg); flex:0 0 auto;}
  .statusbar .time{font-size:15px; font-weight:700;}
  .statusbar .stat{display:flex; align-items:center; gap:7px;}
  .topbar{height:50px; display:flex; align-items:center; padding:0 10px; background:var(--bg); flex:0 0 auto;}
  .back{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); cursor:pointer;}
  .topbar .ttl{flex:1; text-align:center; font-size:16px; font-weight:700; margin-right:40px;}
  .prog{height:4px; background:var(--line); margin:0 24px 6px; border-radius:2px; overflow:hidden;}
  .prog i{display:block; height:100%; width:100%; background:var(--primary); border-radius:2px;}
  .body{flex:1; overflow-y:auto; padding:14px 16px 118px; scrollbar-width:none;}
  .body::-webkit-scrollbar{display:none;}
  .q{font-size:22px; font-weight:700; letter-spacing:-.3px; margin:0 4px 18px;}

  .card{background:#fff; border-radius:16px; padding:6px 16px; margin-bottom:12px; box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:15px 0; border-top:1px solid var(--line);}
  .row:first-child{border-top:none;}
  .row .l{font-size:13px; color:var(--placeholder); flex:0 0 auto;}
  .row .r{font-size:15px; font-weight:600; color:var(--ink); text-align:right;}
  .row .r .sub2{font-size:12px; color:var(--placeholder); font-weight:500; margin-top:2px;}

  /* 받는 혜택 (강조 카드) */
  .bencard{background:var(--primary-50); border-radius:16px; padding:16px; margin-bottom:12px;}
  .bencard .bh{font-size:14px; font-weight:700; color:var(--primary-dark); margin-bottom:12px;}
  .ben{display:flex; align-items:center; gap:10px; padding:9px 0;}
  .ben iconify-icon{font-size:20px; color:var(--primary); flex:0 0 auto;}
  .ben .bl{flex:1; font-size:14px; color:var(--sub); font-weight:500;}
  .ben .bv{font-size:15px; font-weight:700; color:var(--primary-dark);}

  .amtcard{padding:18px 16px;}
  .arow{display:flex; justify-content:space-between; align-items:center; margin-bottom:11px;}
  .arow .l{font-size:14px; color:var(--sub);} .arow .v{font-size:15px; font-weight:600; color:var(--ink);}
  .divline{border-top:1px solid var(--line); margin:14px 0;}
  .arow.total .l{font-size:15px; font-weight:700; color:var(--ink);}
  .arow.total .v{font-size:26px; font-weight:700; color:var(--ink); letter-spacing:-.5px;}
  .flow{display:flex; align-items:flex-start; gap:9px; background:var(--primary-50); border-radius:12px; padding:13px; margin-top:16px;}
  .flow iconify-icon{font-size:19px; color:var(--primary); flex:0 0 auto; margin-top:1px;}
  .flow div{font-size:13px; color:var(--primary-dark); line-height:1.55; font-weight:600;}

  .footer{position:absolute; bottom:0; left:0; right:0; padding:14px 16px 26px; background:linear-gradient(180deg, rgba(244,245,247,0), var(--bg) 30%);}
  .btn-primary{width:100%; height:56px; border:none; border-radius:15px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:var(--primary); background:var(--primary-grad); box-shadow:var(--btn-shadow);}
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span class="time">9:41</span><span class="stat">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect y="8" width="3" height="4" rx="1" fill="#191F28"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#191F28"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#191F28"/><rect x="15" width="3" height="12" rx="1" fill="#191F28"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2C11 2 13.3 3 15 4.7l-1.3 1.4C12.3 4.7 10.5 4 8.5 4S4.7 4.7 3.3 6.1L2 4.7C3.7 3 6 2 8.5 2z" fill="#191F28"/><circle cx="8.5" cy="10" r="1.3" fill="#191F28"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13"><rect x=".5" y=".5" width="22" height="12" rx="3.5" fill="none" stroke="#191F28" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.8" fill="#191F28"/><rect x="24" y="4.5" width="1.6" height="4" rx=".8" fill="#191F28" fill-opacity=".35"/></svg>
  </span></div>
  <div class="topbar"><div class="back" onclick="history.back()">‹</div><div class="ttl">결제</div></div>
  <div class="prog"><i></i></div>

  <div class="body">
    <div class="q">이대로 결제할까요?</div>

    <div class="card">
      <div class="row"><span class="l">결제 항목</span><span class="r">상가 임대료</span></div>
      <div class="row"><span class="l">받는 분</span><span class="r">명동상가 임대인</span></div>
      <div class="row"><span class="l">결제 카드</span><span class="r">삼성 Deep Dream<div class="sub2">•••• 4821 · 3개월 무이자</div></span></div>
      <div class="row"><span class="l">반복 결제</span><span class="r">이번만 결제</span></div>
    </div>

    <!-- 받는 혜택 (강조) -->
    <div class="bencard">
      <div class="bh">이번 결제로 받는 혜택</div>
      <div class="ben"><iconify-icon icon="mingcute:gift-fill"></iconify-icon><span class="bl">카드 포인트 적립</span><span class="bv">+6,660원</span></div>
      <div class="ben"><iconify-icon icon="mingcute:bank-card-fill"></iconify-icon><span class="bl">3개월 무이자 할부</span><span class="bv">이자 0원</span></div>
      <div class="ben"><iconify-icon icon="mingcute:bill-fill"></iconify-icon><span class="bl">연말정산 소득공제</span><span class="bv">대상</span></div>
    </div>

    <div class="card amtcard">
      <div class="arow"><span class="l">신청 금액</span><span class="v">680,000원</span></div>
      <div class="arow"><span class="l">수수료 4%</span><span class="v">27,200원</span></div>
      <div class="divline"></div>
      <div class="arow total"><span class="l">총 결제금액</span><span class="v">707,200원</span></div>
      <div class="flow">
        <iconify-icon icon="mingcute:shield-fill"></iconify-icon>
        <div>서류 승인 후 결제·입금돼요. 미승인 시 자동 취소.</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" onclick="location.href='14_완료.html'">707,200원 결제하기</button>
  </div>
</div>
</body>
</html>
